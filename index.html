<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Landing Page</title>

<style>
body{ 
  font-family: Arial;
  margin:0;
  background:#f2f2f2;
}

.container{
  max-width:400px;
  margin:auto;
  background:white;
}

.header{
  text-align:center;
  padding:15px;
  background:#111;
  color:white;
}

.product-img{
  width:100%;
}

.content{
  padding:15px;
}

.price{
  font-size:22px;
  color:green;
  font-weight:bold;
}

.old-price{
  text-decoration: line-through;
  color:red;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.cart{
  background:orange;
  color:white;
}

.whatsapp{
  background:green;
  color:white;
}

.timer{
  background:#ffdddd;
  padding:10px;
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.review{
  background:#f9f9f9;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

  <div class="header">
    🔥 HOT DEAL TODAY
  </div>

 <img class="product-img" src="cwt-12004.png">

  <div class="content">

    <h2>Wireless Earbuds Pro</h2>

    <div class="price">799 TK <span class="old-price">1200 TK</span></div>

    <div class="timer">
      ⏳ Offer ends in: <span id="time">10:00</span>
    </div>

    <button class="cart" onclick="addCart()">Add to Cart</button>

  <a href="https://wa.me/8801937782858?text=I%20want%20to%20order%20Wireless%20Earbuds%20Pro%20-%20799%20TK" target="_blank">
  <button class="whatsapp">Order on WhatsApp</button>
</a>
      

    <div class="review">
      ⭐⭐⭐⭐⭐ "Best sound quality!" - Rahim
    </div>

    <div class="review">
      ⭐⭐⭐⭐⭐ "Fast delivery, nice product" - Karim
    </div>

  </div>

</div>

<script>

// Fake cart alert
function addCart(){
  alert("Product added to cart!");
}

// Countdown timer
let time = 600;

setInterval(function(){
  let min = Math.floor(time/60);
  let sec = time%60;

  document.getElementById("time").innerHTML = min + ":" + sec;

  time--;

  if(time < 0){
    time = 600;
  }

},1000);

</script>

</body>
</html>
